<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dashboard Notes drawer regression</title>
  <style>
    body{margin:0;font:14px system-ui;background:#111;color:#eee}
    #result{margin:0;padding:12px;white-space:pre-wrap}
    #dashboard{display:block;width:100%;height:900px;border:0}
  </style>
</head>
<body>
  <pre id="result">Running...</pre>
  <iframe id="dashboard" src="../Dashboard/ksp_mission_dashboard.html"></iframe>
  <script>
    const result = document.getElementById("result");
    const frame = document.getElementById("dashboard");

    function assert(condition, message) {
      if (!condition) throw new Error(message);
    }

    frame.addEventListener("load", () => {
      try {
        const dashboard = frame.contentWindow;
        const document = frame.contentDocument;
        const active = {
          name: "log_Odyssey",
          relativePath: "log_Odyssey.txt",
          modified: 1784311200,
          size: 2048,
          text: "MET 00:02:14\nOrbit insertion complete.\nCrew reports nominal systems.",
          truncated: false
        };
        const flightPayload = {
          "context.mode": "flight",
          "flight.active": true,
          "v.name": "Odyssey",
          "notes.available": true,
          "notes.activeFound": true,
          "notes.active": active,
          "notes.selected": active,
          "notes.selectedPath": "log_Odyssey.txt",
          "notes.selectionMode": "active",
          "notes.pinned": null,
          "notes.pinnedPath": "",
          "notes.catalog": [
            {name: "Crew Checklist", relativePath: "Crew Checklist.txt", isActiveLog: false, isFavorite: true},
            {name: "log_Odyssey", relativePath: "log_Odyssey.txt", isActiveLog: true, isFavorite: false},
            {name: "Duna Transfer", relativePath: "Mission Plans/Duna Transfer.txt", isActiveLog: false, isFavorite: false}
          ],
          "stage.available": false
        };

        dashboard.onDataKrpc(flightPayload);
        const toggle = document.getElementById("notesToggle");
        const drawer = document.getElementById("notesDrawer");
        const log = document.getElementById("notesLog");
        assert(!toggle.hidden, "Notes trigger did not appear for available telemetry");
        assert(!drawer.classList.contains("open"), "Notes drawer did not start closed");
        assert(frame.contentWindow.getComputedStyle(toggle).marginLeft === "auto",
          "Notes trigger is not aligned to the right edge");

        toggle.click();
        assert(drawer.classList.contains("open"), "Notes trigger did not open the drawer");
        assert(toggle.getAttribute("aria-expanded") === "true",
          "Notes trigger did not expose its expanded state");
        assert(document.getElementById("notesVessel").textContent === "Odyssey",
          "drawer did not identify the active vessel");
        assert(log.textContent.includes("Orbit insertion complete"),
          "drawer did not render the active log text");
        const search = document.getElementById("notesSearch");
        const list = document.getElementById("notesList");
        assert(list.querySelectorAll(".notes-list-row").length === 3,
          "saved-note catalog did not render");
        assert(list.querySelector(".notes-star.favorite"),
          "favorite note did not render with a filled star");
        assert(list.querySelector(".notes-item").textContent.includes("Crew Checklist"),
          "favorite note did not remain at the top of the menu");
        search.value = "Duna";
        search.dispatchEvent(new dashboard.Event("input", {bubbles: true}));
        assert(list.querySelectorAll(".notes-list-row").length === 1 &&
          list.querySelector(".notes-item").textContent.includes("Duna"),
          "saved-note search did not filter the catalog");
        search.value = "";
        search.dispatchEvent(new dashboard.Event("input", {bubbles: true}));

        dashboard.onDataKrpc({
          ...flightPayload,
          "notes.selected": {
            name: "Duna Transfer",
            relativePath: "Mission Plans/Duna Transfer.txt",
            modified: active.modified - 100,
            size: 512,
            text: "Transfer window checklist",
            truncated: false
          },
          "notes.selectedPath": "Mission Plans/Duna Transfer.txt",
          "notes.selectionMode": "browse",
          "notes.pinned": active,
          "notes.pinnedPath": "log_Odyssey.txt"
        });
        assert(log.textContent.includes("Transfer window checklist"),
          "selected saved note did not replace the active log view");
        assert(!document.getElementById("notesActiveButton").disabled,
          "Active button was not enabled while browsing another note");
        const flightNote = document.getElementById("flightNote");
        assert(!flightNote.hidden, "pinned note did not appear as a flight panel");
        assert(document.getElementById("flightNoteLog").textContent.includes("Orbit insertion complete"),
          "flight panel did not retain the independently pinned note");
        assert(document.getElementById("notesPinButton").textContent === "Pin to flight",
          "drawer did not offer to replace the existing pin with the browsed note");
        assert(flightNote.previousElementSibling?.id === "target",
          "pinned note is not the final mission-column panel");
        assert(["auto", "scroll"].includes(
          frame.contentWindow.getComputedStyle(document.getElementById("flightNoteLog")).overflowY),
          "pinned note panel is not scrollable");
        const drawerFontValue = document.getElementById("notesFontValue");
        const panelFontValue = document.getElementById("flightNoteFontValue");
        assert(drawerFontValue.textContent === "10px" && panelFontValue.textContent === "10px",
          "note text size did not start at the 10px default");
        document.getElementById("flightNoteFontIncrease").click();
        assert(drawerFontValue.textContent === "11px" && panelFontValue.textContent === "11px",
          "drawer and pinned-panel text size controls are not synchronized");
        assert(frame.contentWindow.getComputedStyle(log).fontSize === "11px" &&
          frame.contentWindow.getComputedStyle(document.getElementById("flightNoteLog")).fontSize === "11px",
          "shared text size was not applied to both note views");
        for(let index=0;index<20;index++) document.getElementById("notesFontIncrease").click();
        assert(drawerFontValue.textContent === "18px" &&
          document.getElementById("notesFontIncrease").disabled &&
          document.getElementById("flightNoteFontIncrease").disabled,
          "note text size did not stop at the 18px maximum");
        panelFontValue.click();
        assert(drawerFontValue.textContent === "10px" &&
          !document.getElementById("notesFontIncrease").disabled &&
          !document.getElementById("notesFontDecrease").disabled,
          "clicking the size readout did not restore the default");

        dashboard.onDataKrpc({
          ...flightPayload,
          "notes.pinned": active,
          "notes.pinnedPath": "log_Odyssey.txt"
        });
        assert(document.getElementById("notesPinButton").textContent === "Unpin from flight",
          "drawer did not identify the selected note as pinned");

        dashboard.onDataKrpc(flightPayload);

        document.getElementById("notesClose").click();
        assert(!drawer.classList.contains("open"), "close button did not close the drawer");

        dashboard.onDataKrpc({
          ...flightPayload,
          "notes.active": {
            ...active,
            modified: active.modified + 10,
            size: active.size + 32,
            text: active.text + "\nPreparing circularization burn."
          },
          "notes.selected": {
            ...active,
            modified: active.modified + 10,
            size: active.size + 32,
            text: active.text + "\nPreparing circularization burn."
          }
        });
        assert(toggle.classList.contains("has-update"),
          "closed drawer did not indicate an updated log");
        toggle.click();
        assert(!toggle.classList.contains("has-update"),
          "opening the drawer did not clear the update indicator");

        dashboard.onDataKrpc({
          ...flightPayload,
          "notes.activeFound": false,
          "notes.active": null,
          "notes.selected": null,
          "notes.selectedPath": ""
        });
        assert(document.getElementById("notesEmpty").hidden === false,
          "missing active log did not show the empty state");
        assert(log.hidden, "missing active log left stale log text visible");

        dashboard.onDataKrpc({
          ...flightPayload,
          "context.mode": "editor",
          "flight.active": false,
          "editor.active": true,
          "editor.craftName": "Drawer regression craft",
          "editor.facility": "VAB",
          "editor.bodies": ["Kerbin"],
          "editor.body": "Kerbin",
          "editor.altitude": 0,
          "editor.mach": 0,
          "editor.stable": true,
          "stage.available": false
        });
        assert(!toggle.hidden, "editor transition hid the Notes trigger");
        assert(drawer.classList.contains("open"),
          "editor transition closed the Notes drawer");

        dashboard.onDataKrpc({
          ...flightPayload,
          "context.mode": "inactive",
          "flight.active": false,
          "editor.active": false,
          "v.name": ""
        });
        assert(!document.getElementById("notesInactiveButton").hidden,
          "inactive scene did not expose the overlay Notes button");
        assert(drawer.classList.contains("open"),
          "inactive scene closed the Notes drawer");

        // Leave the visible fixture in flight with the drawer open for inspection.
        dashboard.onDataKrpc({
          ...flightPayload,
          "notes.pinned": active,
          "notes.pinnedPath": "log_Odyssey.txt"
        });
        if(!drawer.classList.contains("open")) toggle.click();
        document.body.classList.remove("modal-open");
        document.querySelectorAll(".scrim").forEach(scrim=>scrim.classList.remove("show"));

        result.textContent = "PASS: Notes supports favorites, search, synchronized bounded text sizing, a scrollable flight pin, updates, and every connected scene.";
        result.dataset.status = "pass";
      } catch (error) {
        result.textContent = `FAIL: ${error.stack || error}`;
        result.dataset.status = "fail";
      }
    });
  </script>
</body>
</html>
